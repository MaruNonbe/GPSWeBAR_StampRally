<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Nagai GPS AR - Story Teller</title>

  <style>
    body { margin:0; overflow:hidden; font-family: sans-serif; }
    #map { position: fixed; left: 0; bottom: 0; width: 100%; height: 30vh; z-index: 500; }

    #infoPanel {
      position:absolute; top:10px; left:10px; right: 10px;
      background:rgba(0,0,0,0.7); padding:10px;
      border-radius:8px; color:#fff; font-size:12px;
      z-index:1000; display: flex; justify-content: space-between;
    }

    #stampStatus {
      position: fixed;
      bottom: calc(30vh + 80px);
      right: 15px;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px;
      border-radius: 12px;
      font-size: 11px;
      max-height: 40vh;
      overflow-y: auto;
      z-index: 1100;
      width: 180px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      display: none;
      border: 1px solid #ddd;
    }

    #toggleBtn {
      position: fixed;
      bottom: calc(30vh + 15px);
      right: 15px;
      width: 55px;
      height: 55px;
      background: #e91e63;
      color: white;
      border-radius: 50%;
      border: none;
      font-size: 24px;
      z-index: 1000;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .stamp-item { margin-bottom: 6px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    .stamp-item.got { color: #e91e63; font-weight: bold; }

    #clearStampsBtn {
      width: 100%;
      margin: 8px 0;
      padding: 7px 8px;
      border: 1px solid #e91e63;
      border-radius: 6px;
      background: #fff;
      color: #e91e63;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    #languagePanel {
      position: fixed;
      top: 78px;
      left: 10px;
      display: flex;
      gap: 4px;
      padding: 5px;
      background: rgba(17, 24, 39, 0.76);
      border-radius: 8px;
      z-index: 1200;
    }

    .lang-btn {
      min-width: 42px;
      height: 30px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 6px;
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #ffe08a;
      border-color: #ffe08a;
      color: #111827;
    }

    #dataSaverBtn {
      position: fixed;
      top: 122px;
      left: 10px;
      min-width: 128px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.76);
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      z-index: 1200;
      cursor: pointer;
    }

    #dataSaverBtn.active {
      background: #14b8a6;
      border-color: #14b8a6;
      color: #052e2b;
    }

    #gpsEvalBtn {
      position: fixed;
      top: 164px;
      left: 10px;
      min-width: 128px;
      height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 8px;
      background: rgba(17, 24, 39, 0.76);
      color: #fff;
      font-size: 12px;
      font-weight: bold;
      z-index: 1200;
      cursor: pointer;
    }

    #gpsEvalPanel {
      position: fixed;
      top: 204px;
      left: 10px;
      width: min(92vw, 360px);
      max-height: calc(70vh - 40px);
      overflow-y: auto;
      background: rgba(255,255,255,0.96);
      color: #222;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 12px;
      z-index: 1300;
      box-shadow: 0 4px 15px rgba(0,0,0,0.25);
      display: none;
      font-size: 12px;
    }

    .gps-eval-row {
      border-top: 1px solid #eee;
      padding: 8px 0;
    }

    .gps-eval-ok {
      color: #0f766e;
      font-weight: bold;
    }

    .gps-eval-ng {
      color: #b91c1c;
      font-weight: bold;
    }

    #arrivalNotice {
      position: fixed;
      left: 50%;
      top: 170px;
      transform: translateX(-50%);
      max-width: min(88vw, 420px);
      padding: 10px 14px;
      background: rgba(17, 24, 39, 0.86);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      text-align: center;
      z-index: 1300;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    #arrivalNotice.show {
      opacity: 1;
    }

    body.data-saver #map {
      display: none;
    }

    body.data-saver #toggleBtn {
      bottom: 15px;
    }

    body.data-saver #stampStatus {
      bottom: 80px;
    }

    a-scene { position: fixed !important; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }
    video { z-index: -1 !important; }
  </style>

  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.1/aframe/build/aframe-ar.js"></script>
</head>

<body>

  <div id="infoPanel">
    <div>
      ID: <span id="id"></span> | <span id="urlId"></span><br>
      走破: <span id="dist">0.000</span> km<br>
      現在: <span id="lat">0</span>, <span id="lon">0</span>
    </div>
    <div style="text-align: right; font-size: 16px;">
      スタンプ<br>
      <span id="stampCount" style="font-weight: bold; color: #ffeb3b;">0</span> / <span id="stampTotal">10</span>
    </div>
  </div>

  <div id="languagePanel" aria-label="Language">
    <button class="lang-btn" data-lang="ja" onclick="setLanguage('ja')">日本語</button>
    <button class="lang-btn" data-lang="en" onclick="setLanguage('en')">EN</button>
    <button class="lang-btn" data-lang="zh" onclick="setLanguage('zh')">中文</button>
    <button class="lang-btn" data-lang="ko" onclick="setLanguage('ko')">한국어</button>
  </div>

  <button id="dataSaverBtn" onclick="toggleDataSaver()">省通信 OFF</button>

  <button id="gpsEvalBtn" onclick="toggleGpsEvaluation()">GPS評価</button>

  <button id="toggleBtn" onclick="toggleStamps()">🏆</button>

  <div id="arrivalNotice"></div>

  <div id="gpsEvalPanel">
    <div style="font-weight:bold; border-bottom:1px solid #ccc; padding-bottom:6px; margin-bottom:8px; display:flex; justify-content:space-between;">
      <span>GPS到着判定評価</span>
      <span onclick="toggleGpsEvaluation()" style="cursor:pointer; color:#999;">✕</span>
    </div>
    <div id="gpsEvalSummary" style="margin-bottom:8px;">GPS取得待ちです。</div>
    <div id="gpsEvalList"></div>
  </div>

  <div id="stampStatus">
    <div style="font-weight:bold; border-bottom:1px solid #ccc; margin-bottom:8px; padding-bottom:5px; display: flex; justify-content: space-between;">
        <span>スタンプ帳</span>
        <span onclick="toggleStamps()" style="cursor:pointer; color:#999;">✕</span>
    </div>
    <button id="clearStampsBtn" onclick="clearStamps()">スタンプをクリア</button>
    <div id="stampList"></div>
  </div>

  <div id="map"></div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true"
    arjs="sourceType: webcam; debugUIEnabled: false; facingMode: environment;"
  >
    <a-camera gps-camera rotation-reader>
      <a-entity id="plate-container" position="0 0 -4"></a-entity>
    </a-camera>
  </a-scene>

  <script>
  'use strict';

  function toggleStamps() {
    const statusDiv = document.getElementById('stampStatus');
    statusDiv.style.display = (statusDiv.style.display === 'none' || statusDiv.style.display === '') ? 'block' : 'none';
  }

  function toggleGpsEvaluation() {
    const panel = document.getElementById('gpsEvalPanel');
    panel.style.display = (panel.style.display === 'none' || panel.style.display === '') ? 'block' : 'none';
    if (panel.style.display === 'block') updateGpsEvaluationUI();
  }

  function formatMeters(value) {
    if (!Number.isFinite(value)) return '-';
    return value >= 1000 ? `${(value / 1000).toFixed(2)}km` : `${value.toFixed(1)}m`;

  function getEffectiveRadius(place, accuracy = 0) {

  function updateGpsEvaluationUI() {
    const summary = document.getElementById('gpsEvalSummary');
    const list = document.getElementById('gpsEvalList');
    if (!summary || !list) return;

    if (!lastGpsPosition) {
      summary.textContent = 'GPS取得待ちです。位置情報を許可してください。';
      list.innerHTML = '';
      return;
    }

    const rows = PLACES.map(place => {
      const distance = getDistance(lastGpsPosition.lat, lastGpsPosition.lon, place.lat, place.lon) * 1000;
      const effectiveRadius = getEffectiveRadius(place, lastGpsPosition.accuracy);
      return { place, distance, effectiveRadius, canDisplay: distance <= effectiveRadius };
    }).sort((a, b) => a.distance - b.distance);

    const nearest = rows[0];
    const displayable = rows.filter(row => row.canDisplay);
    summary.innerHTML =
      `現在地: ${lastGpsPosition.lat.toFixed(6)}, ${lastGpsPosition.lon.toFixed(6)}<br>` +
      `GPS精度: ±${formatMeters(lastGpsPosition.accuracy)}<br>` +
      `最寄り: ${getPlaceName(nearest.place)} (${formatMeters(nearest.distance)})<br>` +
      `表示対象: ${displayable.length ? displayable.map(row => getPlaceName(row.place)).join('、') : 'なし'}`;

    list.innerHTML = rows.map(row => {
      const statusClass = row.canDisplay ? 'gps-eval-ok' : 'gps-eval-ng';
      const statusText = row.canDisplay ? '表示されます' : '範囲外';
      return `<div class="gps-eval-row">
        <div><strong>${getPlaceName(row.place)}</strong></div>
        <div>距離: ${formatMeters(row.distance)} / 判定: ${formatMeters(row.effectiveRadius)}</div>
        <div class="${statusClass}">${statusText}</div>
      </div>`;
    }).join('');
  }

  function checkStamps(lat, lon, accuracy = 0) {
    let nearestPlace = null;
    let nearestDistance = Infinity;

    PLACES.forEach(p => {
      const distance = getDistance(lat, lon, p.lat, p.lon) * 1000;
      if (distance <= getEffectiveRadius(p, accuracy) && distance < nearestDistance) {
        nearestPlace = p;
        nearestDistance = distance;
      }
    });

    if (!nearestPlace) {
      activePlaceId = '';
      clearedPlaceId = '';
      return;
    }

    if (clearedPlaceId === nearestPlace.id) return;

    const isNewStamp = !userStamps[nearestPlace.id];
    if (!isNewStamp && activePlaceId === nearestPlace.id) return;

    activePlaceId = nearestPlace.id;
    if (isNewStamp) {
      userStamps[nearestPlace.id] = true;
      localStorage.setItem('user_stamps', JSON.stringify(userStamps));
      updateStampUI();
      sendLog({ event: 'stamp_get', poiId: nearestPlace.id, poiName: getPlaceName(nearestPlace), lat, lon, lang: currentLang });
    }

    showStoryPlate(nearestPlace);
    showArrivalNotice(nearestPlace, isNewStamp);
  }

  let map, marker, prevPos = null, totalDistance = 0, lastLogTime = 0, gpsWatchStarted = false;

  function loadGoogleMapsScript() {
    if (window.google && window.google.maps) {
      initMap();
      return;
    }

    const script = document.createElement('script');
    script.src = GOOGLE_MAPS_API_URL;
    script.async = true;
    script.defer = true;
    script.onload = initMap;
    script.onerror = () => {
      console.warn('Google Maps failed to load. Starting GPS without map.');
      startGPS();
    };
    document.head.appendChild(script);
  }

  function initMap() {
    if (!(window.google && window.google.maps)) {
      startGPS();
      return;
    }

    try {
      map = new google.maps.Map(document.getElementById('map'), {
        center: { lat: 38.10, lng: 140.03 }, 
        zoom: 15, 
        disableDefaultUI: true 
      });
      marker = new google.maps.Marker({ map: map });

    // 軌跡を描画するための線の初期設定
      polyline = new google.maps.Polyline({
        path: pathCoordinates,
        geodesic: true,
        strokeColor: '#FF0000', // 線の色（赤）
        strokeOpacity: 1.0,
        strokeWeight: 3, // 線の太さ
        map: map
      });
    } catch (err) {
      console.warn('Google Maps initialization failed. Starting GPS without map.', err);
    }

    startGPS();
  }

  function startGPS() {
    if (gpsWatchStarted) return;
    gpsWatchStarted = true;

    navigator.geolocation.watchPosition(pos => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const accuracy = pos.coords.accuracy || 0;
      lastGpsPosition = { lat, lon, accuracy };
      document.getElementById('lat').textContent = lat.toFixed(5);
      document.getElementById('lon').textContent = lon.toFixed(5);

      const newPos = { lat: lat, lng: lon };
      
      // 1. 軌跡配列に新しい座標を追加
      if (!isDataSaverMode && map && marker && polyline) {
        pathCoordinates.push(newPos);
      // 2. 線のデータを更新して地図に反映
        polyline.setPath(pathCoordinates);

        marker.setPosition(newPos);
        map.setCenter(newPos);
      }

      checkStamps(lat, lon, accuracy);
      if (document.getElementById('gpsEvalPanel').style.display === 'block') updateGpsEvaluationUI();

      if (prevPos) {
        const d = getDistance(prevPos.lat, prevPos.lng, lat, lon);
        if (d > 0.002) {
          totalDistance += d;
          document.getElementById('dist').textContent = totalDistance.toFixed(3);
        }
      }
      prevPos = { lat, lng: lon };

      if (Date.now() - lastLogTime > getPositionLogInterval()) {
        sendLog({ event: 'position', lat, lon, distance_km: totalDistance, dataSaver: isDataSaverMode });
        lastLogTime = Date.now();
      }
    }, err => {
      console.warn(err);
      const summary = document.getElementById('gpsEvalSummary');
      if (summary) summary.textContent = `GPS取得エラー: ${err.message || err.code}`;
    }, { enableHighAccuracy: true });
  }

  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  }

  function createARModels() {
    PLACES.forEach(p => {
      if(userStamps[p.id]) showStoryPlate(p);
    });
  }

  window.addEventListener('load', () => {
    document.getElementById('id').textContent = DEVICE_ID;
    document.getElementById('urlId').textContent = URL_ID || '-';
    updateLanguageButtons();
    updateDataSaverUI();
    updateClearStampsButtonUI();
    updateStampUI();
    startGPS();
    loadGoogleMapsScript();
    window.addEventListener('click', () => {
      const v = document.querySelector('video');
      if(v) v.play();
    }, {once: true});
  });
  </script>
</body>
